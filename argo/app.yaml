apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ton-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://github.com/HamzaAITMOUHAOUALLA/MINI-PROJET.git'
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
